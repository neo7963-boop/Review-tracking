<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Companion - Patient Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --primary-color: #4A90E2;
            --danger-color: #E74C3C;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* App Header & Logo Section */
        .app-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px 5px;
        }

        .app-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .app-logo svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .app-title h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #2C3E50;
        }
        .app-title p {
            margin: 2px 0 0 0;
            font-size: 12px;
            color: #7F8C8D;
        }

        /* Sections Styling */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            color: #2C3E50;
            border-bottom: 2px solid #ECF0F1;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Inputs & Buttons */
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #BDC3C7;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
