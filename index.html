<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Companion</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clinic">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='url(%23grad)'/><defs><linearGradient id='grad' x1='0%27 y1='0%27 x2='100%27 y2='100%'><stop offset='0%27 stop-color='%234A90E2'/><stop offset='100%27 stop-color='%23357ABD'/></linearGradient></defs><path d='M135 95h-35v35h-20V95H45V75h35V40h20v35h35v20z' fill='white'/></svg>">

    <style>
        :root { --primary-color: #4A90E2; --danger-color: #E74C3C; --bg-color: #F5F7FA; --card-bg: #FFFFFF; --text-color: #333333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 12px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* App Header */
        .app-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding: 5px 0; }
        .app-logo { width: 44px; height: 44px; background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .app-logo svg { width: 24px; height: 24px; fill: white; }
        .app-title h1 { margin: 0; font-size: 20px; color: #2C3E50; }
        .app-title p { margin: 2px 0 0 0; font-size: 11px; color: #7F8C8D; }
        
        .card { background: var(--card-bg); border-radius: 14px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 5px rgba(0,0,0,0.04); }
        h2 { margin-top: 0; font-size: 16px; color: #2C3E50; border-bottom: 2px solid #ECF0F1; padding-bottom: 8px; }
        
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 10px; margin: 6px 0 12px 0; border: 1px solid #BDC3C7; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { background-color: var(--primary-color); color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        button.danger { background-color: var(--danger-color); }
        button.secondary { background-color: #95A5A6; }
        
        .checkbox-manager-list, .holiday-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag-item, .holiday-btn { background: #ECF0F1; padding: 4px 10px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .holiday-btn { background: #EAF2F8; color: #2980B9; border: 1px solid #AED6F1; border-radius: 6px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 12px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
        
        /* 未來兩星期個案清單樣式 */
        .two-week-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .two-week-item { background: #F8F9FA; border-left: 4px solid var(--primary-color); padding: 10px 12px; border-radius: 0 8px 8px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .two-week-item:active { background: #EBEDEF; }
        .two-week-hn { font-weight: bold; color: #2C3E50; font-size: 15px; }
        .two-week-date { font-size: 13px; color: #7F8C8D; background: #EAECEE; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
        .two-week-empty { color: #7f8c8d; text-align: center; font-size: 14px; padding: 10px 0; }
        
        /* 新症 Tag 樣式 */
        .new-case-badge { background-color: #E8F8F5; color: #117A65; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 6px; border: 1px solid #A3E4D7;}

        /* Patient Cards */
        .patient-card { border: 2px solid #ECF0F1; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .patient-card.clash { border-color: var(--danger-color); background-color: #FDEDEC; }
        .clash-warning { color: var(--danger-color); font-weight: bold; font-size: 12px; margin-top: 5px; display: none; }
        .patient-card.clash .clash-warning { display: block; }
        .patient-hn { font-size: 16px; font-weight: bold; color: #2C3E50; display: flex; align-items: center; }
        .search-box { background: #EAECEE; border: none; padding: 10px; font-size: 15px; margin-bottom: 8px; }
        .search-tags-title { font-size: 13px; color: #7F8C8D; margin-bottom: 5px; font-weight: bold;}
        .search-checkbox-group { background: #F8F9FA; padding: 10px; border-radius: 8px; border: 1px dashed #BDC3C7; }

        /* 📅 日曆樣式 */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 5px; }
        .cal-header h2 { border: none; padding: 0; margin: 0; font-size: 16px; }
        .cal-btn-group { display: flex; align-items: center; gap: 4px; }
        .cal-btn-group button { padding: 4px 10px; font-size: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; width: 100%; box-sizing: border-box; }
        .cal-weekday { font-weight: bold; color: #7F8C8D; font-size: 11px; padding: 4px 0; background: #EAECEE; border-radius: 4px; }
        .cal-day { min-height: 55px; background: #FAFAFA; border: 1px solid #EAECEE; border-radius: 6px; padding: 2px; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start; box-sizing: border-box; overflow: hidden; }
        .cal-day .day-num { font-size: 10px; font-weight: bold; color: #95A5A6; text-align: left; padding-left: 2px; }
        .cal-day.today { background-color: #EBF5FB; border-color: #5DADE2; }
        .cal-day.today .day-num { color: #2980B9; }
        .cal-day.is-holiday-bg { background-color: #FEF9E7; border-color: #F4D03F; }
        .cal-badge { font-size: 8px; padding: 1px 2px; margin: 1px 0; border-radius: 3px; color: white; font-weight: 500; text-align: center; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.1; }
        .badge-normal { background-color: #4A90E2; }
        .badge-done { background-color: #2ECC71 !important; }
        .badge-review { background-color: #E67E22 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="app-logo">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
        </div>
        <div class="app-title">
            <h1>Clinic Companion</h1>
            <p>Patient Follow-up & Calendar Tracker</p>
        </div>
    </div>

    <div class="card">
        <h2>⏱️ 未來兩星期個案清單 (Next 14 Days Cases)</h2>
        <div class="two-week-list" id="twoWeekList"></div>
    </div>

    <div class="card">
        <div class="cal-header">
            <h2>📅 總個案排程日曆表</h2>
            <div class="cal-btn-group">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="calMonthTitle" style="font-weight:bold; font-size:13px; min-width: 75px; text-align:center; display:inline-block;">2026年 05月</span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
        <h2>⚙️ 設定：管理自訂剔格</h2>
        <div class="checkbox-manager-list" id="managerList"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newCheckboxName" placeholder="輸入新格仔名稱" style="margin:0;">
            <button onclick="addCustomCheckbox()">新增</button>
        </div>
    </div>

    <div class="card">
        <h2>📅 設定：我放假嘅日期範圍</h2>
        <div class="grid-2">
            <div>
                <label style="font-size:12px;">由:</label>
                <input type="date" id="holidayStart" style="margin-bottom:10px;">
            </div>
            <div>
                <label style="font-size:12px;">至:</label>
                <input type="date" id="holidayEnd" style="margin-bottom:10px;">
            </div>
        </div>
        <button onclick="addHolidayRange()" class="secondary" style="width: 100%;">新增假期</button>
        <div class="holiday-list" id="holidayList"></div>
    </div>

    <div class="card" id="formSection">
        <h2>✍️ 輸入新個案 / 編輯資料</h2>
        <form id="patientForm" onsubmit="savePatient(event)">
            <input type="hidden" id="editIndex" value="-1">
            <label><b>1. Patient HN Number:</b></label>
            <input type="text" id="hnNumber" placeholder="例如: HN123456" required>
            <label><b>2. 項目剔格:</b></label>
            <div class="checkbox-group" id="formCheckboxes"></div>
            <div class="grid-2">
                <div>
                    <label><b>3. 最後一次見 (新症可留空):</b></label>
                    <input type="date" id="lastSeen">
                </div>
                <div>
                    <label><b>4. 下一次見:</b></label>
                    <input type="date" id="nextSeen">
                </div>
            </div>
            <label><b>6. 備忘錄:</b></label>
            <textarea id="freeText" rows="3" placeholder="打返有咩要留意..."></textarea>
            <button type="submit" style="width: 100%; padding: 12px;">儲存病人資料</button>
            <button type="button" id="cancelEditBtn" class="secondary" style="width: 100%; margin-top: 8px; display: none;" onclick="resetForm()">取消編輯</button>
        </form>
    </div>

    <div class="card">
        <h2>🔍 綜合搜尋 (Search Notes & Tags)</h2>
        <input type="text" id="searchBox" class="search-box" placeholder="輸入關鍵字搜尋備忘錄..." oninput="renderPatients()">
        <div class="search-tags-title">💡 按已剔項目過濾：</div>
        <div class="checkbox-group search-checkbox-group" id="searchCheckboxes"></div>
    </div>

    <div class="card">
        <h2>📋 病人檔案名單</h2>
        <div id="patientList"></div>
    </div>
</div>

<script>
    let db = { checkboxes: ['已完成', '要review', '已簽字', 'Report ready', '要配藥'], holidayRanges: [], patients: [] };
    let currentCalDate = new Date();

    if(localStorage.getItem('clinicCompanionDB')) { db = JSON.parse(localStorage.getItem('clinicCompanionDB')); }
    function saveData() { localStorage.setItem('clinicCompanionDB', JSON.stringify(db)); }
    
    function renderCheckboxManager() {
        const list = document.getElementById('managerList'); const formGroup = document.getElementById('formCheckboxes'); const searchGroup = document.getElementById('searchCheckboxes');
        list.innerHTML = ''; formGroup.innerHTML = ''; searchGroup.innerHTML = '';
        db.checkboxes.forEach((name, index) => {
            list.innerHTML += `<div class="tag-item">${name} <span style="color:red;cursor:pointer;" onclick="deleteCheckbox(${index})">×</span></div>`;
            formGroup.innerHTML += `<label class="checkbox-label"><input type="checkbox" value="${name}" class="patient-chk"> ${name}</label>`;
            searchGroup.innerHTML += `<label class="checkbox-label" style="font-size:12px;"><input type="checkbox" value="${name}" class="search-filter-chk" onchange="renderPatients()"> ${name}</label>`;
        });
    }
    function addCustomCheckbox() {
        const input = document.getElementById('newCheckboxName'); const val = input.value.trim();
        if(val && !db.checkboxes.includes(val)) { db.checkboxes.push(val); input.value = ''; saveData(); renderCheckboxManager(); }
    }
    function deleteCheckbox(index) { db.checkboxes.splice(index, 1); saveData(); renderCheckboxManager(); }

    function renderHolidays() {
        const list = document.getElementById('holidayList'); list.innerHTML = '';
        db.holidayRanges.sort((a, b) => a.start.localeCompare(b.start));
        db.holidayRanges.forEach((range, index) => {
            let txt = range.start === range.end ? range.start : `${range.start} 至 ${range.end}`;
            list.innerHTML += `<div class="holiday-btn" onclick="deleteHolidayRange(${index})">🌴 ${txt} ❌</div>`;
        });
    }
    function addHolidayRange() {
        const start = document.getElementById('holidayStart').value; let end = document.getElementById('holidayEnd').value;
        if (!start) return; if (!end) end = start;
        if (start > end) { alert('結束日期唔可以早過開始日期！'); return; }
        if(!db.holidayRanges.some(r => r.start === start && r.end === end)) {
            db.holidayRanges.push({ start, end }); document.getElementById('holidayStart').value = ''; document.getElementById('holidayEnd').value = '';
            saveData(); renderHolidays(); renderPatients(); renderCalendar(); renderTwoWeekList();
        }
    }
    function deleteHolidayRange(index) { db.holidayRanges.splice(index, 1); saveData(); renderHolidays(); renderPatients(); renderCalendar(); renderTwoWeekList(); }
    function checkIfDateIsHoliday(d) { return d ? db.holidayRanges.some(r => d >= r.start && d <= r.end) : false; }

    function savePatient(e) {
        e.preventDefault(); const editIndex = parseInt(document.getElementById('editIndex').value);
        const chks = []; document.querySelectorAll('.patient-chk:checked').forEach(c => chks.push(c.value));
        const pData = {
            hn: document.getElementById('hnNumber').value.trim(), checkedItems: chks,
            lastSeen: document.getElementById('lastSeen').value, nextSeen: document.getElementById('nextSeen').value,
            notes: document.getElementById('freeText').value.trim()
        };
        if(editIndex === -1) db.patients.push(pData); else db.patients[editIndex] = pData;
        saveData(); resetForm(); renderPatients(); renderCalendar(); renderTwoWeekList();
    }

    function renderPatients() {
        const list = document.getElementById('patientList'); const kw = document.getElementById('searchBox').value.toLowerCase();
        const selectedSearchTags = []; document.querySelectorAll('.search-filter-chk:checked').forEach(c => selectedSearchTags.push(c.value));
        list.innerHTML = '';
        if(db.patients.length === 0) { list.innerHTML = '<p style="color:#7f8c8d;text-align:center;">暫無病人檔案</p>'; return; }
        
        db.patients.forEach((p, index) => {
            if(kw && !p.notes.toLowerCase().includes(kw)) return;
            if(!selectedSearchTags.every(tag => p.checkedItems.includes(tag))) return;

            const isClash = checkIfDateIsHoliday(p.nextSeen);
            const ticksHtml = p.checkedItems.map(item => `🏷️ <b>${item}</b>`).join(' | ') || '無';
            const isNewCase = !p.lastSeen;

            list.innerHTML += `
                <div class="patient-card" id="p-card-${index}" style="${isClash ? 'border-color:var(--danger-color);background-color:#FDEDEC;' : ''}">
                    <div class="patient-hn">
                        HN: ${p.hn} ${isNewCase ? '<span class="new-case-badge">🆕 新個案</span>' : ''}
                    </div>
                    <p><b>剔格項目:</b> ${ticksHtml}</p>
                    <p>📅 <b>最後一見:</b> ${p.lastSeen || '❌ 未曾見過 (新個案)'} | 📅 <b>下一次見:</b> ${p.nextSeen || '未填'}</p>
                    <p class="clash-warning" style="${isClash ? 'display:block;' : ''}">⚠️ 警告：下一次見面日子同你放假日子撞咗！</p>
                    <div style="background:#F9F9F9; padding:10px; border-radius:6px; margin-top:10px; font-size:14px; white-space: pre-wrap;"><b>📝 備忘錄:</b><br>${p.notes || '（空白）'}</div>
                    <div style="margin-top: 15px; display:flex; gap:10px;">
                        <button onclick="editPatient(${index})">修改</button>
                        <button class="danger" onclick="deletePatient(${index})">刪除</button>
                    </div>
                </div>`;
        });
    }

    function renderTwoWeekList() {
        const listContainer = document.getElementById('twoWeekList');
        listContainer.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        const fourteenDaysLater = new Date(today); fourteenDaysLater.setDate(today.getDate() + 14);

        const upcomingCases = [];
        db.patients.forEach((p, index) => {
            if (!p.nextSeen) return;
            const nextSeenDate = new Date(p.nextSeen); nextSeenDate.setHours(0,0,0,0);
            if (nextSeenDate >= today && nextSeenDate <= fourteenDaysLater) {
                upcomingCases.push({ patient: p, originIndex: index, dateObj: nextSeenDate });
            }
        });

        if (upcomingCases.length === 0) {
            listContainer.innerHTML = '<div class="two-week-empty">🌴 未來兩星期暫無預約個案</div>';
            return;
        }

        upcomingCases.sort((a, b) => a.dateObj - b.dateObj);

        upcomingCases.forEach(item => {
            const isNew = !item.patient.lastSeen ? ' <span style="color:#117A65; font-size:11px;">[🆕新症]</span>' : '';
            listContainer.innerHTML += `
                <div class="two-week-item" onclick="scrollToPatient(${item.originIndex})">
                    <div class="two-week-hn">🪪 HN: ${item.patient.hn}${isNew}</div>
                    <div class="two-week-date">⏳ 下次見: ${item.patient.nextSeen}</div>
                </div>`;
        });
    }

    function scrollToPatient(index) {
        editPatient(index);
        setTimeout(() => {
            const card = document.getElementById(`p-card-${index}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.transition = 'background-color 0.3s'; card.style.backgroundColor = '#FFF9C4';
                setTimeout(() => { card.style.backgroundColor = ''; }, 1000);
            }
        }, 350);
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); const monthTitle = document.getElementById('calMonthTitle'); grid.innerHTML = '';
        const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
        monthTitle.innerText = `${year}年 ${String(month + 1).padStart(2, '0')}月`;
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        weekdays.forEach(wd => { grid.innerHTML += `<div class="cal-weekday">${wd}</div>`; });
        const firstDayIndex = new Date(year, month, 1).getDay(); const totalDays = new Date(year, month + 1, 0).getDate(); const todayStr = new Date().toISOString().split('T')[0];
        for (let i = 0; i < firstDayIndex; i++) { grid.innerHTML += `<div></div>`; }
        for (let day = 1; day <= totalDays; day++) {
            const currentStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const isToday = currentStr === todayStr ? 'today' : ''; const isHoliday = checkIfDateIsHoliday(currentStr) ? 'is-holiday-bg' : '';
            let dayHtml = `<div class="cal-day ${isToday} ${isHoliday}"><div class="day-num">${day}</div>`;
            db.patients.forEach((p, pIdx) => {
                let badgeClass = 'badge-normal';
                if (p.checkedItems.includes('已完成')) { badgeClass = 'badge-done'; } else if (p.checkedItems.includes('要review')) { badgeClass = 'badge-review'; }
                
                if(p.lastSeen && p.lastSeen === currentStr) { 
                    dayHtml += `<div class="cal-badge ${badgeClass}" onclick="scrollToPatient(${pIdx})">⏮️${p.hn.replace(/^\D+/g, '')}</div>`; 
                }
                if(p.nextSeen === currentStr) { 
                    dayHtml += `<div class="cal-badge ${badgeClass}" onclick="scrollToPatient(${pIdx})">⏭️${p.hn.replace(/^\D+/g, '')}</div>`; 
                }
            });
            dayHtml += `</div>`; grid.innerHTML += dayHtml;
        }
    }

    function changeMonth(direction) { currentCalDate.setMonth(currentCalDate.getMonth() + direction); renderCalendar(); }

    function editPatient(index) {
        const p = db.patients[index]; document.getElementById('editIndex').value = index;
        document.getElementById('hnNumber').value = p.hn; document.getElementById('lastSeen').value = p.lastSeen || '';
        document.getElementById('nextSeen').value = p.nextSeen; document.getElementById('freeText').value = p.notes;
        document.querySelectorAll('.patient-chk').forEach(c => c.checked = p.checkedItems.includes(c.value));
        document.getElementById('cancelEditBtn').style.display = 'block';
    }
    function deletePatient(index) { if(confirm('確定要刪除？')) { db.patients.splice(index, 1); saveData(); renderPatients(); renderCalendar(); renderTwoWeekList(); } }
    function resetForm() { document.getElementById('patientForm').reset(); document.getElementById('editIndex').value = "-1"; document.getElementById('cancelEditBtn').style.display = 'none'; }
    
    renderCheckboxManager(); renderHolidays(); renderPatients(); renderCalendar(); renderTwoWeekList();
</script>
</body>
</html>
